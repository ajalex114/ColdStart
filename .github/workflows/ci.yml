name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ColdStart.sln

      - name: Build
        run: dotnet build ColdStart.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ColdStart.sln --no-build --configuration Release --verbosity normal
