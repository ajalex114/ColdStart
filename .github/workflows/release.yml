name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: src/ColdStart/ColdStart.csproj
  PUBLISH_DIR: src/ColdStart/bin/publish

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Restore
        run: dotnet restore ColdStart.sln

      - name: Build
        run: dotnet build ColdStart.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ColdStart.sln --no-build --configuration Release --verbosity normal

      - name: Publish (self-contained, single-file)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            --output ${{ env.PUBLISH_DIR }}

      - name: Upload published output
        uses: actions/upload-artifact@v4
        with:
          name: coldstart-published
          path: ${{ env.PUBLISH_DIR }}

  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download published output
        uses: actions/download-artifact@v4
        with:
          name: coldstart-published
          path: src/ColdStart/bin/publish

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Update Inno Setup version
        shell: pwsh
        run: |
          $iss = Get-Content installer/coldstart.iss -Raw
          $iss = $iss -replace '#define MyAppVersion "1\.0\.0"', "#define MyAppVersion `"${{ steps.version.outputs.VERSION }}`""
          Set-Content installer/coldstart.iss $iss

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/coldstart.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: coldstart-installer
          path: dist/ColdStartSetup.exe

  msix:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download published output
        uses: actions/download-artifact@v4
        with:
          name: coldstart-published
          path: src/ColdStart/bin/publish

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Generate placeholder Store images
        shell: pwsh
        run: |
          $sizes = @{
            "StoreLogo.png" = "50x50"
            "Square44x44Logo.png" = "44x44"
            "Square71x71Logo.png" = "71x71"
            "Square150x150Logo.png" = "150x150"
            "Wide310x150Logo.png" = "310x150"
            "Square310x310Logo.png" = "310x310"
          }
          $imagesDir = "src/ColdStart.Package/Images"
          foreach ($entry in $sizes.GetEnumerator()) {
            $dims = $entry.Value -split 'x'
            $w = [int]$dims[0]; $h = [int]$dims[1]
            # Create minimal valid PNG (1x1 blue pixel scaled)
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap($w, $h)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(26, 26, 46))
            # Draw a lightning bolt text
            $font = New-Object System.Drawing.Font("Segoe UI", [math]::Max(8, $h / 3))
            $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(99, 102, 241))
            $sf = New-Object System.Drawing.StringFormat
            $sf.Alignment = [System.Drawing.StringAlignment]::Center
            $sf.LineAlignment = [System.Drawing.StringAlignment]::Center
            $rect = New-Object System.Drawing.RectangleF(0, 0, $w, $h)
            $g.DrawString("⚡", $font, $brush, $rect, $sf)
            $g.Dispose()
            $bmp.Save("$imagesDir/$($entry.Key)", [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Dispose()
          }
          Write-Host "Generated placeholder Store images"

      - name: Build MSIX
        shell: pwsh
        run: |
          cd src/ColdStart.Package
          .\Build-Msix.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: coldstart-msix
          path: dist/ColdStart.msix

  release:
    needs: [installer, msix]
    runs-on: ubuntu-latest
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: coldstart-installer
          path: artifacts

      - name: Download MSIX
        uses: actions/download-artifact@v4
        with:
          name: coldstart-msix
          path: artifacts

      - name: Extract version
        id: version
        run: |
          tag="${{ github.ref_name }}"
          ver="${tag#v}"
          echo "VERSION=$ver" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ColdStart v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/ColdStartSetup.exe
            artifacts/ColdStart.msix
          body: |
            ## Installation Options

            ### 💿 EXE Installer (Recommended)
            Download `ColdStartSetup.exe` and run it. Includes Start Menu + desktop shortcuts and an uninstaller.

            ### 📦 MSIX Package
            Download `ColdStart.msix` for sideloading or Microsoft Store submission.

            ### 🍫 Winget (after manifest is accepted)
            ```
            winget install ajalex114.ColdStart
            ```

            ---
            > 💡 **Tip:** Run ColdStart as Administrator for full functionality (disabling startup items, complete boot diagnostics).
