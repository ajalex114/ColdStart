ShortDescription: Startup Performance Inspector — identify what's slowing down your Windows startup
Description: |-
  ColdStart is a Windows desktop application that analyzes your system's startup
  performance. It scans startup items from the Registry, Startup Folder, Scheduled
  Tasks, and Services, then provides actionable recommendations to speed up your
  boot time. Features include a visual timeline, app usage monitoring, and the
  ability to safely disable unnecessary startup items.
